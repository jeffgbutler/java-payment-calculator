greeting: Hello TAP!

spring:
  application:
    name: payment-calculator

info:
  app:
    name: Payment Calculator

management:
  endpoint:
    health:
      show-details: always
    info:
      access: unrestricted
  endpoints:
    web:
      exposure:
        include: "*"
  tracing:
    sampling:
      probability: 1.0
  otlp:
    metrics:
      export:
        url: https://api.honeycomb.io/v1/metrics
        headers:
          "x-honeycomb-team": "${HONEYCOMB_API_KEY}"
  opentelemetry:
    logging:
      export:
        otlp:
          endpoint: https://api.honeycomb.io/v1/logs
          headers:
            "x-honeycomb-team": "${HONEYCOMB_API_KEY}"
    tracing:
      export:
        otlp:
          endpoint: https://api.honeycomb.io/v1/traces
          headers:
            "x-honeycomb-team": "${HONEYCOMB_API_KEY}"
